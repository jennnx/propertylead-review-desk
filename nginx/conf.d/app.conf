# Reverse proxy in front of the Next.js web role.
#
# HTTP-only by design. On a real VPS, terminate TLS at this layer by adding a
# second `server { listen 443 ssl http2; ... }` block referencing a cert
# (certbot, mkcert in dev, or a Cloudflare-issued cert), and redirect :80 to
# :443. Alternatively, replace this service entirely with Caddy or Traefik —
# both handle Let's Encrypt automatically with one config line.

upstream nextjs_upstream {
  # `web` is the compose service name; docker's internal DNS resolves it.
  server web:3000;
  keepalive 32;
}

server {
  listen 80 default_server;
  server_name _;

  # Don't leak the nginx version in error pages / Server headers.
  server_tokens off;

  # Reasonable upload size for API routes (Next.js default request size is
  # typically <1MB; bump if you start accepting large bodies).
  client_max_body_size 10m;

  # Standard reverse-proxy headers. X-Forwarded-Proto lets Next.js generate
  # https:// URLs correctly once TLS is added in front of this proxy.
  proxy_http_version 1.1;
  proxy_set_header Host              $host;
  proxy_set_header X-Real-IP         $remote_addr;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Forwarded-Host  $host;
  proxy_set_header Upgrade           $http_upgrade;
  proxy_set_header Connection        "upgrade";

  # Long-lived caching for Next's content-hashed static assets — they're
  # immutable, so the browser can hold them forever.
  location /_next/static/ {
    proxy_pass http://nextjs_upstream;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  # Everything else passes through unchanged. Next.js owns route handling,
  # static files in public/, SSR, and API routes.
  location / {
    proxy_pass http://nextjs_upstream;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
  }
}
